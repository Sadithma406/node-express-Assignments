<html>

<body>
  <div id="step1">
    <label> Email: </label>
    <input type="text" name="email" id="email"><br><br>
    <button id="btn" type="button" onClick="sendOTP()">Next</button><br><br>
    <p id="errMsg1"></p>
  </div>
  <div id="step2" style="display:none">
    <label> Enter the OTP sent: </label>
    <input type="text" name="otp" id="otp"><br><br>
    <button id="btn" type="button" onClick="verifyOtp()">Verify OTP</button><br><br>
    <p id="errMsg2"></p>
  </div>
  <div id="step3" style="display:none">
    <label> New Password: </label>
    <input type="password" name="newPassword" id="newPassword"><br><br>
    <label> Confirm New Password: </label>
    <input type="password" name="confirmPassword" id="confirmPassword"><br><br>
    <button id="btn" type="button" onClick="resetPassword()">Reset Password</button><br><br>
    <p id="errMsg3"></p>
  </div>
</body>

<script>
  let sharedEmail = "";

  function sendOTP() {
    const step1 = document.getElementById("step1");
    const step2 = document.getElementById("step2");
    const email = document.getElementById("email").value;
    const errMsg = document.getElementById("errMsg1");
    fetch("/api/forgot-password", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ email })
    })
      .then(response => response.json())
      .then(data => {
        if (data.success) {
          sharedEmail = email;
          errMsg.innerHTML = "";
          step1.style.display = "none";
          step2.style.display = "block";
        }
        else {
          errMsg.innerHTML = data.message;
        }
      })
      .catch(err => {
        alert("Error connecting to server");
      });
  }
  function verifyOtp() {
    const step2 = document.getElementById("step2");
    const step3 = document.getElementById("step3");
    const otp = document.getElementById("otp").value.trim();
    if (!otp) { document.getElementById("errMsg2").innerHTML = "Please enter the OTP."; return; }
    fetch("/api/verify-otp", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ email: sharedEmail, otp })  // fixed: send email+otp
    })
      .then(response => response.json())
      .then(data => {
        if (data.success) {  // fixed: server does comparison now
          document.getElementById("errMsg2").innerHTML = "";
          step2.style.display = "none";
          step3.style.display = "block";
        }
        else {
          document.getElementById("errMsg2").innerHTML = data.message || "OTP is incorrect";
        }
      })
      .catch(err => {
        alert("Error connecting to server " + err);
      })
  }
  function resetPassword() {
    const step3 = document.getElementById("step3"); // fixed: was undefined
    const newPassword = document.getElementById("newPassword").value;
    const confirmPassword = document.getElementById("confirmPassword").value;
    const errMsg = document.getElementById("errMsg3");
    if (!newPassword || !confirmPassword) {
      errMsg.innerHTML = "Please fill in both fields.";
      return;
    }
    if (newPassword !== confirmPassword) {
      errMsg.innerHTML = "Passwords do not match";
      return;
    }
    fetch("/api/reset-password", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ email: sharedEmail, newPassword })  // fixed: use sharedEmail
    })
      .then(response => response.json())
      .then(data => {
        if (data.success) {
          alert("Password reset successfully!");
          window.location.href = "/index.html";
        }
        else {
          errMsg.innerHTML = data.message;
        }
      })
      .catch(err => {
        alert("Error connecting to server " + err);
      })
  }
</script>

</html>
